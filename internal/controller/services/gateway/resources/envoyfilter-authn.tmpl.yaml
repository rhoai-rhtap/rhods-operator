apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: {{.EnvoyFilter}}
  namespace: {{.GatewayNamespace}}
  labels:
    {{.ComponentLabelKey}}: {{.ComponentLabelValue}}
spec:
  workloadSelector:
    labels:
      {{.GatewayNameLabelKey}}: {{.GatewayName}}
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
            subFilter:
              name: "envoy.filters.http.router"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.ext_authz
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
          transport_api_version: V3
          http_service:
            server_uri:
              uri: https://{{.KubeAuthProxyServiceName}}.{{.GatewayNamespace}}.svc.cluster.local:{{.GatewayHTTPSPort}}/oauth2/auth
              # Use Istio's auto-created EDS cluster for better load balancing across all pods
              cluster: outbound|{{.GatewayHTTPSPort}}||{{.KubeAuthProxyServiceName}}.{{.GatewayNamespace}}.svc.cluster.local
              timeout: {{.AuthProxyTimeout}}
            authorization_request:
              allowed_headers:
                patterns:
                - exact: cookie
            authorization_response:
              allowed_upstream_headers:
                patterns:
                - exact: x-auth-request-user
                - exact: x-auth-request-email
                - exact: authorization
              allowed_client_headers:
                patterns:
                - exact: set-cookie
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
            subFilter:
              name: "envoy.filters.http.router"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.lua
        typed_config:
          "@type": "type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua"
          inline_code: |
            function envoy_on_request(request_handle)
              -- Check for Authorization header set by ext_authz via --set-authorization-header
              -- which contains the OIDC id_token as "Bearer <id_token>"
              local auth_header = request_handle:headers():get("authorization")

              -- Only process requests that have been authenticated (have auth headers)
              -- This ensures we don't strip cookies during ext_authz call to auth proxy
              -- The presence of the authorization header indicates authentication succeeded
              -- and we're now forwarding to upstream services, not to the auth proxy
              if auth_header then
                -- Dashboard / sidecars read the user token from x-forwarded-access-token
                -- (--auth-token-header=x-forwarded-access-token, empty prefix). Mirror the JWT
                -- from Authorization (id_token from oauth2-proxy --set-authorization-header).
                local bearer = auth_header:match("^Bearer%s+(.+)$")
                if bearer then
                  request_handle:headers():replace("x-forwarded-access-token", bearer)
                end
                -- Strip OAuth2 proxy cookies only when forwarding to upstream services
                -- Cookie name is injected at runtime from AuthProxyCookieName constant (gateway_support.go:59)
                -- Pattern matches cookies starting with the cookie name, handling variations like:
                --   - _oauth2_proxy (main cookie)
                --   - _oauth2_proxy_1, _oauth2_proxy_2 (split cookies if cookie size exceeds limits)
                local cookie_header = request_handle:headers():get("cookie")
                if cookie_header then
                  local filtered_cookies = {}
                  local cookie_pattern = "^{{.AuthProxyCookieName}}"
                  
                  -- Parse and filter cookies in a single pass
                  for cookie in cookie_header:gmatch("([^;]+)") do
                    -- Trim whitespace and extract cookie name
                    local trimmed = cookie:match("^%%s*(.-)%%s*$")
                    if trimmed ~= "" then
                      local cookie_name = trimmed:match("^([^=]+)")
                      -- Only keep cookies that don't match the OAuth2 proxy cookie pattern
                      if cookie_name and not cookie_name:match(cookie_pattern) then
                        table.insert(filtered_cookies, trimmed)
                      end
                    end
                  end
                  
                  -- Update or remove Cookie header based on filtered results
                  if #filtered_cookies > 0 then
                    request_handle:headers():replace("cookie", table.concat(filtered_cookies, "; "))
                  else
                    request_handle:headers():remove("cookie")
                  end
                end
              end
              -- If no auth token present, preserve cookies (needed for ext_authz authentication)
            end